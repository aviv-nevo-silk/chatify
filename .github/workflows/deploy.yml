name: Deploy Chatify to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Compute base path
        id: base
        run: |
          # repo name like 'chatify' → base path '/chatify/'
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          echo "base=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          echo "site=https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          CHATIFY_BASE: ${{ steps.base.outputs.base }}
        run: npm run build

      - name: Generate production manifest
        env:
          SITE: ${{ steps.base.outputs.site }}
        run: |
          # Replace https://localhost:3001 with the public site URL.
          sed "s|https://localhost:3001|${SITE}|g" manifest.xml > dist/manifest.xml
          echo "Production manifest will reference: ${SITE}"
          grep -o 'https://[^"<]*' dist/manifest.xml | sort -u

      - name: Copy public icons
        run: |
          mkdir -p dist/assets
          cp -v assets/icon-*.png dist/assets/

      - name: Copy synthetic fixtures (for dev.html preview)
        run: |
          mkdir -p dist/tests/fixtures/synthetic
          cp -v tests/fixtures/synthetic/*.json dist/tests/fixtures/synthetic/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
