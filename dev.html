<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatify · Dev</title>
    <link rel="stylesheet" href="/src/styles/chat.css" />
  </head>
  <body class="dev-body">
    <header class="dev-header">
      <div class="dev-header__brand" aria-label="Chatify">
        <svg class="dev-header__logo" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
          <defs>
            <linearGradient id="chatify-logo-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#25d366" />
              <stop offset="100%" stop-color="#0fae8a" />
            </linearGradient>
          </defs>
          <!-- Outer chat bubble -->
          <path
            d="M16 3C8.268 3 2 8.268 2 14.8c0 3.66 1.95 6.92 5.02 9.06L5.6 28.4a.7.7 0 0 0 1.02.78l4.95-2.74A15.7 15.7 0 0 0 16 26.6c7.732 0 14-5.268 14-11.8C30 8.268 23.732 3 16 3z"
            fill="url(#chatify-logo-grad)"
          />
          <!-- Inner reply bubble -->
          <path
            d="M21 11.5c-3.59 0-6.5 2.46-6.5 5.5 0 1.7.93 3.21 2.4 4.21l-.69 2.32a.5.5 0 0 0 .74.55l2.36-1.4c.54.13 1.11.2 1.69.2 3.59 0 6.5-2.46 6.5-5.5s-2.91-5.88-6.5-5.88z"
            fill="#0b141a"
            opacity="0.9"
          />
        </svg>
        <span class="dev-header__wordmark">Chatify</span>
        <span class="dev-header__tag">dev</span>
      </div>
      <label class="dev-header__picker">
        <span class="dev-header__picker-label">Fixture</span>
        <select id="fixture-picker">
          <option value="">— pick a fixture —</option>
          <option value="__all__">⭐ All fixtures (stacked)</option>
          <optgroup label="Real (from inbox — gitignored)">
            <option value="gil-niv-mixed-hebrew">Gil Niv · mixed Hebrew (6 msgs)</option>
            <option value="sentara-forward">Sentara forward (7 bubbles after expansion)</option>
            <option value="missing-elastic-data">Missing elastic data (deep 11-msg chain)</option>
          </optgroup>
          <optgroup label="Synthetic (committed, used in tests)">
            <option value="synthetic/forward-chain">Forward chain (4-deep support thread)</option>
            <option value="synthetic/mixed-language">Mixed-language (RTL + mention pill)</option>
            <option value="synthetic/attachment-heavy">Attachment-heavy (PDF + image + CID)</option>
          </optgroup>
        </select>
      </label>
      <span id="dev-status" class="dev-header__status"></span>
    </header>
    <main id="chat-root" class="chat-root"></main>
    <script type="module" src="/src/dev.ts"></script>
  </body>
</html>
